{% extends "base.html" %}

{% block content %}

<section class="login-section">

    <div class="login-container">

        <h2>🎓 Student Login</h2>

        <form method="POST">

            <div class="form-group">

                <label>USN</label>

                <input
                    type="text"
                    name="usn"
                    placeholder="Enter your USN"
                    required
                >

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your Password"
                    required
                >

            </div>

            <button type="submit" class="btn">

                Login

            </button>

        </form>

    </div>

</section>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<section class="profile-section">

    <div class="profile-card">

        <div class="profile-header">

            {% if student[7] %}

                <img src="{{ url_for('static', filename='uploads/' + student[7]) }}"
                     alt="Student">

            {% else %}

                <img src="{{ url_for('static', filename='images/student.png') }}"
                     alt="Student">

            {% endif %}

            <h2>👤 My Profile</h2>

        </div>

        <div class="profile-details">

            <p><strong>Name :</strong> {{ student[1] }}</p>

            <p><strong>USN :</strong> {{ student[2] }}</p>

            <p><strong>Email :</strong> {{ student[4] }}</p>

            <p><strong>Phone :</strong> {{ student[5] }}</p>

            <p><strong>Department :</strong> {{ student[6] }}</p>

        </div>

        <div class="profile-buttons">

            <a href="/change-password" class="edit-btn">
                🔒 Change Password
            </a>

            <a href="/student-dashboard" class="delete-btn">
                ⬅ Back to Dashboard
            </a>

        </div>

    </div>

</section>

{% endblock %}

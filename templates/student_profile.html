{% extends "base.html" %}

{% block content %}

<section class="profile-section">

    <div class="profile-card">

        <div class="profile-header">

                    
        {% if student[6] %}

        <img src="{{ url_for('static', filename='uploads/' + student[6]) }}" alt="Student">

        {% else %}

        <img src="{{ url_for('static', filename='images/student.png') }}" alt="Student">

        {% endif %}


            <h2>Student Profile</h2>

        </div>

        <div class="profile-details">

            <p><strong>Name :</strong> {{ student[1] }}</p>

            <p><strong>USN :</strong> {{ student[2] }}</p>

            <p><strong>Email :</strong> {{ student[3] }}</p>

            <p><strong>Phone :</strong> {{ student[4] }}</p>

            <p><strong>Department :</strong> {{ student[5] }}</p>

        </div>

        <div class="profile-buttons">

            <a href="/edit-student/{{ student[0] }}" class="edit-btn">

                ✏ Edit Profile

            </a>

            <a
                href="/delete-student/{{ student[0] }}"
                class="delete-btn"
                onclick="return confirm('Delete this student?')">

                🗑 Delete

            </a>

        </div>

    </div>

</section>

{% endblock %}

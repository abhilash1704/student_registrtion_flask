{% extends "base.html" %}

{% block content %}

<section class="form-section">

    <div class="form-container">

        <h2>Admin Login</h2>

        <form method="POST">

            <div class="form-group">

                <label>Username</label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required
                >

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required
                >

            </div>

            <button class="btn">

                Login

            </button>

        </form>

    </div>

</section>

{% endblock %}

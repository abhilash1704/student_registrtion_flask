{% extends "base.html" %}

{% block content %}

<section class="student-section">

    <div class="student-container">

        <h2>Student List</h2>

        <table>

            <thead>

                <tr>
                    <th>Name</th>
                    <th>USN</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Department</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

                {% for student in students %}

                <tr>

                <td>{{ student[1] }}</td>
                <td>{{ student[2] }}</td>
                <td>{{ student[3] }}</td>
                <td>{{ student[4] }}</td>
                <td>{{ student[5] }}</td>

                <td>
                    <a href="/edit-student/{{ student[0] }}" class="edit-btn">
                        ✏️ Edit
                    </a>
                </td>

            </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</section>

{% endblock %}

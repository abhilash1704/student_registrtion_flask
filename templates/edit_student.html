{% extends "base.html" %}

{% block content %}

<section class="form-section">

    <div class="form-container">

        <h2>Edit Student</h2>

        <form action="/update-student/{{ student[0] }}" method="POST">

            <div class="form-group">

                <label>Student Name</label>

                <input
                    type="text"
                    name="name"
                    value="{{ student[1] }}"
                    required
                >

            </div>

            <div class="form-group">

                <label>USN</label>

                <input
                    type="text"
                    name="usn"
                    value="{{ student[2] }}"
                    required
                >

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    value="{{ student[3] }}"
                    required
                >

            </div>

            <div class="form-group">

                <label>Phone</label>

                <input
                    type="text"
                    name="phone"
                    value="{{ student[4] }}"
                    required
                >

            </div>

            <div class="form-group">

                <label>Department</label>

                <input
                    type="text"
                    name="department"
                    value="{{ student[5] }}"
                    required
                >

            </div>

            <button type="submit" class="btn">

                Update Student

            </button>

        </form>

    </div>

</section>

{% endblock %}

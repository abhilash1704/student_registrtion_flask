{% extends "base.html" %}

{% block content %}

<section class="form-section">

    <div class="form-container">

        <h2>Edit Student</h2>

        <form action="/update-student/{{ student[0] }}" method="POST">

            <!-- Student Name -->
            <div class="form-group">

                <label>Student Name</label>

                <input
                    type="text"
                    name="name"
                    value="{{ student[1] }}"
                    required
                >

            </div>

            <!-- USN -->
            <div class="form-group">

                <label>USN</label>

                <input
                    type="text"
                    name="usn"
                    value="{{ student[2] }}"
                    required
                >

            </div>

            <!-- Email -->
            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    value="{{ student[3] }}"
                    required
                >

            </div>

            <!-- Phone -->
            <div class="form-group">

                <label>Phone</label>

                <input
                    type="text"
                    name="phone"
                    value="{{ student[4] }}"
                    required
                >

            </div>

            <!-- Department -->
            <div class="form-group">

                <label>Department</label>

                <select name="department">

                    <option {% if student[5] == "ISE" %}selected{% endif %}>ISE</option>

                    <option {% if student[5] == "CSE" %}selected{% endif %}>CSE</option>

                    <option {% if student[5] == "ECE" %}selected{% endif %}>ECE</option>

                    <option {% if student[5] == "EEE" %}selected{% endif %}>EEE</option>

                    <option {% if student[5] == "ME" %}selected{% endif %}>ME</option>

                </select>

            </div>

            <button type="submit" class="btn">

                Update Student

            </button>

        </form>

    </div>

</section>

{% endblock %}
